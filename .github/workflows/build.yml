# SPDX-License-Identifier: AGPL-3.0-or-later

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '24 4 * * *'

concurrency:
  group: main

permissions:
  contents: write

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Composer packages
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: |
            .
            ${{ steps.composer-cache.outputs.dir }}
          restore-keys: cache-
          key: cache-${{ github.sha }}

      - name: setup
        run: |
          # $1 path
          # $2 url
          # $3 clone args (extracted)
          function sync_repo() {
            if [ -d "$1" ]; then
              pushd "$1"
              git remote set-url origin "$2"
              git pull || git fetch
              popd
            else
              git clone "$2" $3 "$1"
            fi
          }

          sync_repo core https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git "--depth=1 -b main"
          cd core
          sync_repo private https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git "--depth=1 -b data"
          cd private
          sync_repo mesa.git https://github.com/external-mirrors/mesa "--bare -b main"
          cd ..
          composer install --no-dev
          cd ..
          sync_repo dist https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git "--depth=1 -b dist"
          cd dist
          git rm . -r || true
          git clean -ffdx
          cp -r ../core/public/. .
          cd ..
          ls -lh *

      - name: parse
        run: |
          cd core
          ./mesamatrixctl parse

      - name: build
        run: |
          SOURCE_BASE_DIR="$(pwd)/core/public"
          DIST_BASE_DIR="$(pwd)/dist"

          find "$SOURCE_BASE_DIR" -type f -name "*.php" | while read -r SOURCE_PATH; do
            RELATIVE_PATH="${SOURCE_PATH#$SOURCE_BASE_DIR}"
            TARGET_PHP_PATH="${DIST_BASE_DIR}${RELATIVE_PATH}"
            TARGET_HTML_PATH="${DIST_BASE_DIR}${RELATIVE_PATH}.html"

            mkdir -p "$(dirname "$TARGET_HTML_PATH")"
            echo -n "Rendering: $RELATIVE_PATH ... "
            (
              cd "$(dirname "$SOURCE_PATH")" || exit
              php "$(basename "$SOURCE_PATH")" > "$TARGET_HTML_PATH"
              rm "$TARGET_PHP_PATH"
            )
            if [ $? -eq 0 ]; then
              echo "Saved"
            else
              echo "Error!"
            fi
          done
          echo -e "\nBuild Finished."
  
      - run: |
          cd dist
          ln -s index.php.html index.html

      - run: |
          function save() {
            pushd "$1"
            if [ -n "$(git status --porcelain)" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -A
              git pull
              git commit -m "build"
              git push
            fi
            popd
          }

          save core/private
          save dist
